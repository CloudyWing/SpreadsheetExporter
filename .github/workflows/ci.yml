name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
      - release/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_NOLOGO: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore .\SpreadsheetExporter.slnx

      - name: Build
        run: dotnet build .\SpreadsheetExporter.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test .\SpreadsheetExporter.slnx --configuration Release --no-build --verbosity normal
